# Create a Crédito venta via the inline POS (ADR-048) and verify it
# surfaces under Cuentas por Cobrar for the Director role.
#
# Covers P1C-M3-T03 (Crédito requires cliente) and P1C-M3-T06
# (Maestro verifies Cuentas por Cobrar membership).
#
# Precondition: wizard complete, at least one product AND one client
# exist. Chain flows:
#
#   ./apps/mobile/maestro/scripts/fresh-install.sh \
#       apps/mobile/maestro/flows/wizard-local-standalone.yaml
#   maestro test apps/mobile/maestro/flows/inventario-producto.yaml
#   maestro test apps/mobile/maestro/flows/cliente-crear.yaml
#   maestro test apps/mobile/maestro/flows/venta-credito.yaml
#
# inventario-producto creates "Tortilla"; cliente-crear creates
# "Carla Márquez". Both must exist before this flow runs.
appId: mx.cachink.mobile
---
- launchApp

# Navigate to the Ventas tab (Operativo role).
- tapOn:
    id: "tab-ventas"

# The product grid should show the "Tortilla" product.
- assertVisible:
    id: "ventas-product-grid"
- assertVisible: "Tortilla"

# Tap the product card to open the VentaConfirmSheet.
- tapOn: "Tortilla"
- assertVisible:
    id: "venta-confirm-sheet"

# Switch payment method to Crédito. Tap the method picker then
# pick Crédito from the Combobox popover.
- tapOn:
    id: "venta-confirm-metodo"
- tapOn: "Crédito"

# The client picker appears when Crédito is selected. Tap it and
# pick the first available client (Carla Márquez from the
# precondition flow).
- tapOn:
    id: "venta-confirm-cliente"
- tapOn:
    index: 0

# Submit the Crédito venta.
- tapOn:
    id: "venta-confirm-submit"

# Sheet closes and the new sale appears in the list.
- assertNotVisible:
    id: "venta-confirm-sheet"
- assertVisible: "Tortilla"

# Switch to Director role via TopBar and verify the sale shows
# under Cuentas por Cobrar.
- tapOn:
    id: "top-bar-role-chip"
- tapOn:
    id: "role-director-select"
- assertVisible: "Cuentas por cobrar"
