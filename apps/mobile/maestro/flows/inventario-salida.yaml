# Register a salida on an existing producto; verify stock decrement +
# movimiento visible in the Movimientos view.
# Covers P1C-M5-T04 (Entrada/Salida modal).
#
# Precondition: producto 'Tortilla' with stock >= 5 exists (create via
# inventario-producto.yaml and an entrada flow, or seed e2e-seed.json).
appId: mx.cachink.mobile
---
- launchApp

- tapOn:
    id: "tab-inventario"
# Tap the producto card to open detail popover.
- tapOn: "Tortilla"
- tapOn:
    id: "producto-detail-salida"

# MovimientoModal opens with tipo=salida (cost hidden).
- assertNotVisible:
    id: "movimiento-costo"
- tapOn:
    id: "movimiento-cantidad"
- inputText: "3"
- tapOn:
    id: "movimiento-submit"

- assertNotVisible: "Registrar salida"
# Stock decremented — cannot assert exact number without seeded state,
# but the card renders the updated value.
- assertVisible: "Tortilla"
