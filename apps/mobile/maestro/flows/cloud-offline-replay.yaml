# Cloud mode airplane-mode replay (P1E-M4 C16). Toggles the OS airplane
# mode via `runFlow: adb`, records 3 ventas locally, re-enables
# connectivity, and asserts they sync to the Cloud within 5 s.
appId: mx.cachink.mobile
env:
  EMAIL: ${MAESTRO_CLOUD_EMAIL_A}
  PASSWORD: ${MAESTRO_CLOUD_PASSWORD}
---
- launchApp

- runFlow: cloud-signin-bootstrap

# Enable airplane mode (Android). On iOS this is a manual pre-step
# because Maestro can't toggle system control center.
- runScript:
    script: adb shell cmd connectivity airplane-mode enable

# Ensure at least one product exists for the inline POS (ADR-048).
# If cloud-signin-bootstrap already seeds a product, this is redundant
# but safe — the duplicate-name scenario is handled by the create form.
- tapOn: { id: "tab-productos" }
- tapOn: { id: "stock-nuevo-producto" }
- tapOn: { id: "producto-nombre" }
- inputText: "Offline producto"
- tapOn: { id: "producto-precio-venta" }
- inputText: "100"
- tapOn: { id: "producto-submit" }
- assertVisible: "Offline producto"

# Record 3 ventas offline via the inline POS (ADR-048).
- repeat:
    times: 3
    commands:
      - tapOn: { id: "tab-ventas" }
      - assertVisible: { id: "ventas-product-grid" }
      - tapOn: "Offline producto"
      - assertVisible: { id: "venta-confirm-sheet" }
      - tapOn: { id: "venta-confirm-submit" }
      - assertNotVisible: { id: "venta-confirm-sheet" }

# Disable airplane mode — PowerSync queue drains.
- runScript:
    script: adb shell cmd connectivity airplane-mode disable

- assertVisible:
    text: "SINCRONIZADO"
    timeout: 5000
