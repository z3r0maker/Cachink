# Smoke test: app launches and the JS bundle drives all the way
# through the first-launch flow.
#
# What this verifies:
#   - expo-sqlite init + Drizzle migration runs without crashing
#     (P1C C1-C4).
#   - The ConsentModal auto-mounts on first boot (consent === null)
#     and dismisses correctly when the user picks any option (Audit
#     M-1 STEP0-T05 fix in `app-providers.tsx`).
#   - Btn taps fire `onPress` end-to-end (Audit M-1 STEP0-T01 swap
#     to `<Pressable>` in `btn.tsx` — the prior Tamagui
#     `<View onPress>` silently no-op'd on Maestro/iOS taps).
#   - The wizard renders post-consent and exposes its primary CTAs
#     to the accessibility tree.
#
# Precondition: cachink.db does NOT exist (fresh install). The
# `clearState: true` flag handles this for us.
appId: mx.cachink.mobile
---
- launchApp:
    clearState: true
- assertVisible: "¿Enviar reportes de errores?"
- tapOn: "Decidir después"
- assertNotVisible: "¿Enviar reportes de errores?"
- assertVisible: "¡Bienvenido a Cachink!"
- assertVisible: "Solo en este dispositivo"
