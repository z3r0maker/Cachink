# Mobile cannot host LAN — verify the lan-server card is disabled with
# the inline explanation visible (ADR-039 WUX-M4-T03).
#
# This flow proves the platform-aware copy: mobile users navigating to
# Step 2B see the host card greyed out and the explanation text
# "Esta opción solo funciona en computadoras (Windows o Mac)…" visible
# below it. The card should refuse taps.
#
# Precondition: fresh install. Run via wrapper:
#   ./apps/mobile/maestro/scripts/fresh-install.sh \
#       apps/mobile/maestro/flows/wizard-mobile-disabled-host.yaml
appId: mx.cachink.mobile
---
- launchApp

# Dismiss first-launch ConsentModal (smoke-launch.yaml covers the
# full consent flow; other wizard flows just need to get past it).
- tapOn:
    id: "consent-modal-later"
    optional: true

- assertVisible: "¡Bienvenido a Cachink!"
- tapOn: { id: "wizard-step1-multi-card" }

# Step 2B — assert the disabled-note is visible (its presence is the
# definition of "card is disabled").
- assertVisible: { id: "wizard-step2b-server" }
- assertVisible: { id: "wizard-step2b-server-note" }
- assertVisible: "Esta opción solo funciona en computadoras"

# Tapping the disabled card is a no-op — we're still on Step 2B.
- tapOn: { id: "wizard-step2b-server-card" }
- assertVisible: { id: "wizard-step2b-server" }

# Cloud is the available alternative; tap to confirm the rest of the
# screen is functional.
- assertVisible: { id: "wizard-step2b-cloud" }
