# Wizard → BusinessForm → RolePicker happy path (ADR-039 four-screen flow).
# Covers P1C-M1-T01 (role picker), P1C-M2-T03 (wizard), P1C-M2-T04
# (mode stored in AppConfig), P1C-M2-T05 (business creation form),
# WUX-M4 (post-rewrite step IDs).
#
# Precondition: fresh install. Run via the wrapper script:
#   ./apps/mobile/maestro/scripts/fresh-install.sh \
#       apps/mobile/maestro/flows/wizard-local-standalone.yaml
appId: mx.cachink.mobile
---
- launchApp

# First-launch ConsentModal blocks the accessibility tree on a fresh
# install. smoke-launch.yaml asserts the full consent flow; other
# wizard flows just need to dismiss it so the wizard becomes
# inspectable.
- tapOn:
    id: "consent-modal-later"

- assertVisible: "¡Bienvenido a Cachink!"

# Step 1 → Solo → Step 2A → Local (single fastest path on mobile).
- tapOn:
    id: "wizard-step1-solo-card"
- assertVisible: { id: "wizard-step2a-local" }
- tapOn:
    id: "wizard-step2a-local-card"

# BusinessForm.
- assertVisible: "Tu negocio"
- tapOn:
    id: "business-nombre"
- inputText: "Taquería Don Pedro"
- tapOn:
    id: "business-submit"

# RolePicker.
- assertVisible: "¿Con qué rol vas a trabajar hoy?"
- tapOn:
    id: "role-operativo-select"

# Tabs mount — the Ventas list is the default Operativo tab.
- assertVisible: "Ventas"
- assertVisible: "Total del día"
